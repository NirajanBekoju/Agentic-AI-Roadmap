site_name: Agentic AI Course Notes
site_description: My notes and code from the Agentic AI course
theme:
  name: material

plugins:
  - search
  - mkdocs-jupyter:
      execute: false         # set true if you want cells to re-run on build
      include_source: true   # adds a download button for the .ipynb

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Module 01 - LLM and Prompt Engineering Foundations:
    - Foundation of LLM:
      - Intro to LLM: module_1_LLM_and_Prompt_Engineering_Foundations/1_Foundation/intro_to_llm.md
      - Tokenization: module_1_LLM_and_Prompt_Engineering_Foundations/1_Foundation/tokenization.md
      - Architecture: module_1_LLM_and_Prompt_Engineering_Foundations/1_Foundation/architecture.md
      - LLM Types & Taxonomy: module_1_LLM_and_Prompt_Engineering_Foundations/1_Foundation/llm_types.md
    - Prompt Engineering:
      - Roles and Messages : module_1_LLM_and_Prompt_Engineering_Foundations/2_prompt_engineering/1_roles_and_messages.md
      - Core Techniques: module_1_LLM_and_Prompt_Engineering_Foundations/2_prompt_engineering/2_core_techniques.md
      - Chain of Thoughts: module_1_LLM_and_Prompt_Engineering_Foundations/2_prompt_engineering/3_chain_of_thoughts.md
      - Structured Output: module_1_LLM_and_Prompt_Engineering_Foundations/2_prompt_engineering/4_structured_output.md  
    - Parameters:
      - Parameters: module_1_LLM_and_Prompt_Engineering_Foundations/3_parameters/1_parameters.md
      - Models and APIs: module_1_LLM_and_Prompt_Engineering_Foundations/3_parameters/2_models_and_apis.md
      - Tools and SDKs: module_1_LLM_and_Prompt_Engineering_Foundations/3_parameters/3_tools_and_sdks.md
    - Projects:
      - Extract: module_1_LLM_and_Prompt_Engineering_Foundations/extract.ipynb
  # Add new modules here as you go